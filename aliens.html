<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#0a0e1f">
<title>Defend the Herd — Nuzz prototype</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
  html,body{height:100%;overflow:hidden;background:#0a0e1f;font-family:'Comic Sans MS','Chalkboard SE',cursive,sans-serif;color:#fff;touch-action:none}
  #wrap{position:fixed;inset:0}
  canvas{display:block}
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:14px 18px;pointer-events:none;z-index:5;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,.6)}
  #hud .lost{color:#ff8fa3}
  #proto{position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:11px;letter-spacing:.15em;opacity:.4;z-index:5;pointer-events:none}
  #hint{position:fixed;left:0;right:0;bottom:34px;text-align:center;font-size:15px;font-weight:bold;opacity:.9;z-index:5;pointer-events:none;text-shadow:0 2px 4px rgba(0,0,0,.6);transition:opacity .6s}
  #end{position:fixed;inset:0;display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:30px;background:rgba(10,14,31,.86);z-index:10}
  #end h2{font-size:28px;margin-bottom:10px;text-shadow:0 3px 0 rgba(0,0,0,.4)}
  #end p{max-width:330px;line-height:1.5;font-size:15px;margin-bottom:18px;opacity:.92}
  #end button{font-family:inherit;font-size:17px;font-weight:bold;color:#0a0e1f;background:#ffd95e;border:none;border-radius:26px;padding:13px 32px;cursor:pointer;box-shadow:0 5px 0 #c9a93f}
  #err{position:fixed;inset:0;display:none;justify-content:center;align-items:center;text-align:center;padding:30px;z-index:20;font-size:15px;line-height:1.6}
</style>
</head>
<body>
<div id="wrap"></div>
<div id="hud"><div>🐄 Herd: <span id="herd">0</span></div><div class="lost">👽 Lost: <span id="lost">0</span></div><div>⏱ <span id="time">60</span></div></div>
<div id="hint">Sweep your flashlight onto the UFOs to break their beams!</div>
<div id="proto">PROTOTYPE · PixiJS / WebGL</div>
<div id="end"><h2 id="endTitle">🚜</h2><p id="endBlurb"></p><button onclick="location.reload()">Play again</button></div>
<div id="err">Couldn't load the graphics engine (PixiJS CDN). Check your connection and reload.</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
(function(){
if(!window.PIXI){ document.getElementById('err').style.display='flex'; return; }

/* ---- anonymous interest beacon (same sink as the main game) ---- */
function track(ev,props){ try{
  var b=JSON.stringify(Object.assign({ev:ev,level:'aliens-proto',t:Date.now()},props||{}));
  if(navigator.sendBeacon) navigator.sendBeacon('/api/e',new Blob([b],{type:'application/json'}));
}catch(e){} }

const app = new PIXI.Application({
  resizeTo: window, backgroundColor: 0x0a0e1f, antialias: true,
  resolution: Math.min(window.devicePixelRatio||1, 2), autoDensity: true
});
document.getElementById('wrap').appendChild(app.view);
const S = app.screen;                       // logical (CSS-pixel) screen size

/* ---- layers (back to front) ---- */
const L = {};
['bg','beam','animal','ufo','light','fx','none'].forEach(k=>{ L[k]=new PIXI.Container(); app.stage.addChild(L[k]); });
// additive blend is set per-sprite (light/beam/ufo-glow/particles) — a Container's blendMode doesn't propagate.

/* ---- a soft round light texture (radial gradient via a canvas) ---- */
function lightTexture(size, r,g,b){
  const c=document.createElement('canvas'); c.width=c.height=size;
  const cx=c.getContext('2d'); const grd=cx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  grd.addColorStop(0,'rgba('+r+','+g+','+b+',0.95)');
  grd.addColorStop(0.45,'rgba('+r+','+g+','+b+',0.30)');
  grd.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
  cx.fillStyle=grd; cx.fillRect(0,0,size,size);
  return PIXI.Texture.from(c);
}
const TEX_WARM = lightTexture(256,255,244,200);   // flashlight
const TEX_BEAM = lightTexture(256,150,255,210);   // tractor beam glow
const TEX_UFO  = lightTexture(256,150,230,255);   // ufo underglow

let groundY = S.height*0.82;

/* ---- background: stars, moon, ground, barn ---- */
function buildBackground(){
  L.bg.removeChildren();
  groundY = S.height*0.82;
  const stars = new PIXI.Graphics();
  for(let i=0;i<90;i++){ stars.beginFill(0xffffff, 0.3+Math.random()*0.6);
    stars.drawCircle(Math.random()*S.width, Math.random()*groundY*0.9, Math.random()*1.4+0.4); stars.endFill(); }
  L.bg.addChild(stars);
  const moon=new PIXI.Graphics(); moon.beginFill(0xfdf6c8).drawCircle(S.width*0.82,S.height*0.16,34).endFill();
  moon.beginFill(0x0a0e1f,0.35).drawCircle(S.width*0.82+12,S.height*0.16-8,30).endFill();
  L.bg.addChild(moon);
  const ground=new PIXI.Graphics();
  ground.beginFill(0x122a18).drawRect(0,groundY,S.width,S.height-groundY).endFill();
  ground.beginFill(0x1c3a22).drawRect(0,groundY,S.width,6).endFill();
  L.bg.addChild(ground);
  // barn silhouette (flavor — future "herd into the barn" layer)
  const barn=new PIXI.Graphics(); const bx=S.width*0.12, by=groundY, bw=92, bh=64;
  barn.beginFill(0x5a2320).drawRect(bx-bw/2,by-bh,bw,bh).endFill();
  barn.beginFill(0x5a2320).drawPolygon([bx-bw/2-6,by-bh, bx,by-bh-30, bx+bw/2+6,by-bh]).endFill();
  barn.beginFill(0x2a120f).drawRect(bx-15,by-30,30,30).endFill();
  L.bg.addChild(barn);
}
buildBackground();
window.addEventListener('resize',()=>{ buildBackground(); flashlight.y=Math.min(flashlight.y,S.height); });

/* ---- animals ---- */
const animals=[];
function makeAnimal(type){
  const g=new PIXI.Graphics();
  if(type==='cow'){
    g.beginFill(0xffffff).drawEllipse(0,0,20,14).endFill();
    g.beginFill(0x2a2a30).drawCircle(-7,-3,5).drawCircle(8,3,4).endFill();
    g.beginFill(0xffffff).drawCircle(16,-6,8).endFill();          // head
    g.beginFill(0x2a2a30).drawCircle(18,-7,1.6).endFill();
    g.beginFill(0xf6a0b0).drawEllipse(0,12,5,3).endFill();        // udder
    g.lineStyle(3,0x2a2a30); g.moveTo(-10,12).lineTo(-10,20); g.moveTo(8,12).lineTo(8,20);
  } else if(type==='sheep'){
    g.beginFill(0xf2f2f5).drawCircle(-8,0,11).drawCircle(0,-4,12).drawCircle(9,0,11).drawCircle(2,6,11).endFill();
    g.beginFill(0x3a3a44).drawCircle(15,-2,7).endFill();
    g.beginFill(0xffffff).drawCircle(13,-3,1.4).drawCircle(17,-3,1.4).endFill();
    g.lineStyle(3,0x3a3a44); g.moveTo(-6,11).lineTo(-6,19); g.moveTo(7,11).lineTo(7,19);
  } else { // chicken
    g.beginFill(0xfff3d6).drawEllipse(0,0,11,10).endFill();
    g.beginFill(0xffffff).drawCircle(8,-7,6).endFill();
    g.beginFill(0xe0566a).drawCircle(8,-13,2.5).drawCircle(11,-12,2.5).endFill();   // comb
    g.beginFill(0xf5a13a).drawPolygon([13,-7,19,-6,13,-4]).endFill();               // beak
    g.beginFill(0x2a2a30).drawCircle(9,-8,1.3).endFill();
    g.lineStyle(2,0xf5a13a); g.moveTo(-3,9).lineTo(-3,15); g.moveTo(4,9).lineTo(4,15);
  }
  const a={ gfx:g, type:type, x:40+Math.random()*(S.width-80), y:groundY-12,
            vx:(Math.random()<0.5?-1:1)*(0.2+Math.random()*0.3), state:'graze', wob:Math.random()*7, ufo:null };
  g.x=a.x; g.y=a.y; L.animal.addChild(g); animals.push(a); return a;
}
for(let i=0;i<8;i++) makeAnimal(['cow','sheep','chicken'][i%3]);

/* ---- UFOs ---- */
const ufos=[];
function makeUfo(){
  const targets=animals.filter(a=>a.state==='graze' && !a.ufo);
  if(!targets.length) return;
  const tgt=targets[(Math.random()*targets.length)|0];
  const c=new PIXI.Container();
  const glow=new PIXI.Sprite(TEX_UFO); glow.anchor.set(0.5); glow.scale.set(0.9); glow.y=8; glow.blendMode=PIXI.BLEND_MODES.ADD; c.addChild(glow);
  const g=new PIXI.Graphics();
  g.beginFill(0x9fb6c8).drawEllipse(0,0,34,11).endFill();
  g.beginFill(0xc9dbe8).drawEllipse(0,-7,17,10).endFill();
  for(let i=-2;i<=2;i++){ g.beginFill(0x6cf0c0).drawCircle(i*12,3,2.4).endFill(); }
  c.addChild(g);
  c.x=Math.random()*S.width; c.y=-30;
  L.ufo.addChild(c);
  const beam=new PIXI.Graphics(); beam.blendMode=PIXI.BLEND_MODES.ADD; L.beam.addChild(beam);
  const u={ gfx:c, lights:g, beam:beam, x:c.x, y:c.y, tx:tgt.x, ty:S.height*(0.16+Math.random()*0.12),
            hp:1, target:tgt, beaming:false, dead:false, hit:0 };
  tgt.ufo=u; ufos.push(u);
}

/* ---- flashlight (follows the pointer) ---- */
const flashlight=new PIXI.Sprite(TEX_WARM);
flashlight.anchor.set(0.5); flashlight.scale.set(1.1); flashlight.x=S.width/2; flashlight.y=S.height*0.6;
flashlight.blendMode=PIXI.BLEND_MODES.ADD;
L.light.addChild(flashlight);
const core=new PIXI.Sprite(TEX_WARM); core.anchor.set(0.5); core.scale.set(0.5); core.blendMode=PIXI.BLEND_MODES.ADD; flashlight.addChild(core);
const LIGHT_R=120;
let pointerActive=false;
function setLight(e){ pointerActive=true; flashlight.x=e.clientX; flashlight.y=e.clientY;
  const h=document.getElementById('hint'); if(h) h.style.opacity=0; }
window.addEventListener('pointermove',setLight);
window.addEventListener('pointerdown',setLight);

/* ---- particles ---- */
const parts=[];
function burst(x,y,n,color){ for(let i=0;i<n;i++){ const p=new PIXI.Graphics();
  p.beginFill(color).drawCircle(0,0,2+Math.random()*3).endFill(); p.x=x; p.y=y; p.blendMode=PIXI.BLEND_MODES.ADD;
  L.fx.addChild(p); const a=Math.random()*Math.PI*2,s=2+Math.random()*4;
  parts.push({gfx:p,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1}); } }

/* ---- state ---- */
let lost=0, timeLeft=60*60, ended=false, t=0;   // timeLeft in frames (60s)
const herdEl=document.getElementById('herd'), lostEl=document.getElementById('lost'), timeEl=document.getElementById('time');
let spawnT=120;
track('start');

function endGame(){
  ended=true;
  const left=animals.length, end=document.getElementById('end');
  let title,blurb;
  if(lost===0){ title='🏆 Not a single abduction!'; blurb="The whole herd is safe and the farmer thinks you're some kind of miracle. The aliens leave empty-handed (hooved?)."; }
  else if(lost<=2){ title='🚜 Good night\'s work'; blurb="A couple of critters got beamed up, but the farmer's grateful — that's a solid shift on the night watch."; }
  else if(lost<=5){ title='👽 Bit of a raid'; blurb="The aliens made off with a few. The farmer's squinting at the sky and muttering. Could\'ve gone worse."; }
  else { title='🛸 Rough one'; blurb="The pasture's looking a little empty. Somewhere out there, a UFO is very full of livestock."; }
  document.getElementById('endTitle').textContent=title;
  document.getElementById('endBlurb').textContent=blurb+'  ('+left+' saved · '+lost+' taken)';
  end.style.display='flex';
  track('run_end',{result:(lost===0?'perfect':lost<=2?'good':lost<=5?'ok':'rough'),lost:lost,saved:left});
}

/* ---- main loop (PixiJS ticker — delta is ~1 at 60fps, so motion is frame-rate independent) ---- */
app.ticker.add((delta)=>{
  if(ended) return;
  t+=delta;
  timeLeft-=delta; if(timeLeft<=0){ timeLeft=0; endGame(); }
  timeEl.textContent=Math.ceil(timeLeft/60);
  herdEl.textContent=animals.length; lostEl.textContent=lost;

  // spawn UFOs over time, faster as the clock runs down
  spawnT-=delta;
  if(spawnT<=0 && ufos.length<5){ makeUfo(); spawnT=90+Math.random()*120 - (60-timeLeft/60)*1.4; }

  // flashlight idle bob if untouched
  if(!pointerActive){ flashlight.x=S.width/2+Math.sin(t*0.02)*60; flashlight.y=S.height*0.55; }
  flashlight.rotation=Math.sin(t*0.1)*0.04;
  core.alpha=0.7+Math.sin(t*0.3)*0.2;

  // animals
  for(let i=animals.length-1;i>=0;i--){ const a=animals[i];
    if(a.state==='graze'){ a.x+=a.vx*delta; if(a.x<24||a.x>S.width-24) a.vx*=-1;
      a.gfx.y=groundY-12+Math.sin(t*0.1+a.wob)*1.2; a.gfx.scale.x=a.vx<0?-1:1; }
    else if(a.state==='lifting'){ a.gfx.x+=Math.sin(t*0.4+a.wob)*0.6; a.gfx.rotation=Math.sin(t*0.3)*0.3;
      a.gfx.y-=0.55*delta; if(a.ufo && a.gfx.y < a.ufo.y+18){ // abducted
        burst(a.gfx.x,a.gfx.y,14,0xc070ff); L.animal.removeChild(a.gfx); animals.splice(i,1); lost++;
        if(a.ufo){ a.ufo.target=null; a.ufo.beaming=false; a.ufo.leaving=true; } } }
    else if(a.state==='falling'){ a.gfx.rotation*=0.85; a.gfx.y+=2.4*delta;
      if(a.gfx.y>=groundY-12){ a.gfx.y=groundY-12; a.gfx.rotation=0; a.state='graze'; } }
    a.gfx.x = a.x = (a.state==='graze') ? a.x : a.gfx.x;
  }

  // ufos
  for(let i=ufos.length-1;i>=0;i--){ const u=ufos[i];
    u.lights.children; u.hit*=0.85;
    if(u.leaving || (!u.target && u.beaming===false && u.hp<=0)){ u.y-=4*delta; u.gfx.y=u.y; u.gfx.alpha-=0.02*delta;
      u.beam.clear(); if(u.gfx.y<-60||u.gfx.alpha<=0){ L.ufo.removeChild(u.gfx); L.beam.removeChild(u.beam); ufos.splice(i,1); } continue; }
    // fly to hover spot above target
    if(!u.beaming){ u.x+=(u.tx-u.x)*0.05*delta; u.y+=(u.ty-u.y)*0.05*delta; u.gfx.x=u.x; u.gfx.y=u.y;
      if(Math.abs(u.x-u.tx)<6 && Math.abs(u.y-u.ty)<6){ u.beaming=true; if(u.target) u.target.state='lifting'; } }
    else { u.gfx.x=u.x+Math.sin(t*0.1)*4; }
    // beam visual
    u.beam.clear();
    if(u.beaming && u.target){ const topW=14, botW=46, by=groundY-6, pulse=0.18+0.10*Math.sin(t*0.3);
      u.beam.beginFill(0x96ffd2, pulse);
      u.beam.drawPolygon([u.x-topW,u.y+6, u.x+topW,u.y+6, u.x+botW,by, u.x-botW,by]); u.beam.endFill(); }
    // flashlight damage
    const dx=flashlight.x-u.x, dy=flashlight.y-u.y;
    if(Math.hypot(dx,dy)<LIGHT_R){ u.hp-=0.012*delta; u.hit=1;
      if(u.hp<=0){ // driven off!
        burst(u.x,u.y,22,0x8ff0ff); burst(u.x,u.y,10,0xffffff);
        if(u.target){ u.target.state='falling'; u.target.ufo=null; u.target=null; }
        u.beaming=false; u.leaving=true; } }
    u.lights.alpha = u.hit>0.05 ? (0.4+Math.random()*0.6) : 1;   // flicker when hit
    u.gfx.scale.set(1+u.hit*0.06);
  }

  // particles
  for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.gfx.x+=p.vx*delta; p.gfx.y+=p.vy*delta; p.vy+=0.12*delta;
    p.life-=0.03*delta; p.gfx.alpha=Math.max(0,p.life); if(p.life<=0){ L.fx.removeChild(p.gfx); parts.splice(i,1); } }
});
})();
</script>
</body>
</html>
